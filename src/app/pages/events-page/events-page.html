<div class="min-h-screen h-fit pt-20 pb-20 bg-linear-to-b from-black to to-[#0E0114] ">
    <div class="mt-20 m-auto justify-center items-center ">
        <p class="text-center text-violet font-lexend text-base"> School Events  </p>
        <h1 class="mt-3 text-center text-white font-hanson text-4xl"> Upcoming <span class="text-gold"> Events </span></h1>
    </div>

    <!-- events -->
    <div class="m-10 font-lexend h-fit">
        <div class="mx-auto flex flex-col gap-5 w-full sm:w-11/12 md:w-4/5 lg:w-3/4 text-white">
            @for (event of event_list(); track event.id) {
            <a routerLink="/event-details/{{event.id}}" class="block">
                <div class="flex flex-col sm:flex-row rounded-4xl border border-violet bg-gradient-to-b from-[#0F0016] to-[#1E002A] overflow-hidden hover:shadow-lg transition-shadow duration-300">
                
                <!-- Text Section -->
                <div class="p-6 sm:p-10 flex-1 flex flex-col cursor-pointer">
                    <p class="font-bold text-xl sm:text-2xl">
                    {{event.name}}
                    </p>
                    <p class="font-thin text-sm sm:text-base mb-4">
                    {{event.schedule.toDateString()}} | {{event.schedule.toLocaleTimeString()}} | {{event.branch.name}}
                    </p>
                    <p class="font-normal text-sm sm:text-base">
                    {{event.details | slice:0:200}}...
                    </p>
                </div>

                <!-- Image Section -->
                <div class="w-full sm:w-1/4 h-48 sm:h-auto cursor-pointer">
                    <img src="{{event.poster}}" class="w-full h-full object-cover object-center" />
                </div>

                </div>
            </a>
            }
        </div>
    </div>
</div>
