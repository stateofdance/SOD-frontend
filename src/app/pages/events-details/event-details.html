    <div class="flex mb-10 flex-col lg:flex-row w-full text-white ml-10">
        <div class="pr-20 w-full lg:w-2/3">
            <a routerLink="/events" class="mb-20 flex gap-4 items-center cursor-pointer">
                <img src="/images/back.png" alt="back icon" class="w-5 cursor-pointer">
                <p class="font-lexend text-base">Back to Branches</p>
            </a>
            <div>
                <p class="text-violet font-lexend text-base"> Events  </p>
                <h1 class="mt-3 text-white font-lexend font-bold text-2xl sm:text-3xl md:text-4xl">{{event_detail()?.name}}</h1>

            <!-- Event Details (Time, Date, Branch) -->
