<div class="min-h-screen pt-20 md:px-5 bg-black flex flex-col lg:flex-row-reverse">
  
  <!-- Main Content Section -->
  <div class="flex flex-col lg:flex-row w-full text-white gap-10 lg:gap-20 px-5 lg:px-10">
    
    <!-- Text Section -->
    <div class="w-full mt-10 lg:w-2/3 flex flex-col">
      
      <!-- Back Link -->
      <a routerLink="/events" class="mb-5 flex gap-2 items-center cursor-pointer sm:mb-8">
        <img src="/images/back.png" alt="back icon" class="w-5 sm:w-6">
        <p class="font-lexend text-sm sm:text-base">Back to Events</p>
      </a>

      <!-- Event Title -->
      <div>
        <p class="text-violet font-lexend text-sm sm:text-base">Events</p>
        <h1 class="mt-2 sm:mt-3 text-white font-lexend font-bold text-xl sm:text-2xl md:text-3xl lg:text-4xl">
          {{event_detail()?.name}}
        </h1>
      </div>

      <!-- Event Schedule & Branch -->
      <p class="mt-3 sm:mt-5 text-white font-light font-lexend text-xs sm:text-sm md:text-base">
        {{event_detail()?.schedule?.toDateString()}} | {{event_detail()?.schedule?.toLocaleTimeString()}} | {{event_detail()?.branch?.name}}
      </p>

      <!-- Event Description -->
      @if (event_detail()?.details) {
      <p class="mt-3 sm:mt-5 text-white font-light font-lexend text-xs sm:text-sm md:text-base">
        {{event_detail()?.details!}}
      </p>
      }

      <!-- Register Button -->
      @if (event_detail()?.registration_link) {
      <a href="{{event_detail()?.registration_link}}" target="_blank" class="mt-5 sm:mt-10 self-start">
        <button class="font-eurostile text-black font-bold py-1.5 px-4 sm:px-6 border border-black rounded-full bg-gold cursor-pointer hover:scale-105 transition-transform duration-300">
          REGISTER NOW
        </button>
      </a>
      }

    </div>

    <!-- Image Section -->
    <div class="w-full lg:w-1/3 flex-shrink-0 lg:sticky lg:top-20">
      <img src="{{event_detail()?.poster}}" class="w-full min-h-[300px] sm:min-h-[400px] md:min-h-[500px] lg:min-h-[600px] object-cover object-center rounded-xl shadow-lg">
    </div>

  </div>
</div>
