
<div class="min-h-screen pt-35 md:px-15 bg-black flex lg:flex-row flex-col-reverse">
    <div class="flex flex-col lg:sticky w-full lg:w-120 lg:mr-5 lg:top-30 left-0 h-fit lg:mt-0 mt-10">
        <h1 class="font-hanson text-white font-bold text-3xl md:text-6xl lg:text-left text-center">Rent our <span class="text-gold">Studio</span></h1>
        <p class="font-lexend text-white md:text-base my-5 lg:text-left text-center">Your space to move, create, and inspire.</p>
        <div class="flex flex-col w-full mr-5">
            <input #date type="date" name="date" class="text-white border border-white p-2 rounded-lg text-xl [&::-webkit-calendar-picker-indicator]:invert" (change)="selectDate(date.value)" [min]="today.toISOString().slice(0, 10)">
            <select #startTime name="start" id="start" class="text-white border border-white p-2 rounded-lg text-xl my-5" (click)="selectStartTime(startTime.value)">
                @for (time of start_times.slice(0, -2); track $index) {
                    <option value="{{$index}}" class="bg-black">{{time}}</option>
                }
            </select>
            <select #endTime name="end" id="end" class="text-white border border-white p-2 rounded-lg text-xl" (click)="selectEndTime(endTime.value)">
                @for (time of end_times.slice(2); track $index) {
                    <option value="{{time}}" class="bg-black">{{time}}</option>
                }
            </select>
        </div>
        <button class="mt-10 font-eurostile text-white font-bold p-1.5 border border-white rounded-full w-full bg-linear-to-r from-gold to-violet uppercase cursor-pointer"
        (click)="payment()">PROCEED TO PAYMENT</button>
    </div>
    @if (!viewing_branch()) {
        <div class="flex flex-col w-full">
            @for (branch of branches(); track branch.id) {
                <div class="relative w-full h-90 mb-5 overflow-hidden cursor-pointer border"
                (mouseenter)="hovered_branch.set(branch.id)" (mouseleave)="hovered_branch.set(-1)"
                (click)="setBranch(branch.id)" [ngClass]="{'border-white': selected_branch() == branch.id, 'border-transparent': selected_branch() != branch.id}">
                    <img src="{{branch.thumbnail}}" alt="{{branch.name}}" class="w-full">
                    <div class="bg-black opacity-50 absolute inset-0 transition-opacity duration-500 ease-in-out" [ngClass]="{'opacity-50':!is_hovered(branch.id), 'opacity-10':is_hovered(branch.id)}"></div>
                    <div class="flex w-full h-25 justify-between items-center absolute bottom-0 left-0 p-5">
                        <div class="flex items-center">
                            <img src="/images/loc_white.png" alt="loc white" class="h-15">
                            <div class="flex flex-col ml-2">
                                <h3 class="font-lexend text-white text-xl">{{branch.name}}</h3>
                                <p class="font-lexend text-white text-sm">{{branch.address}}</p>
                            </div>
                        </div>
                        <div class="flex flex-col">
                            <p class="font-lexend text-white text-base text-center mb-1">P {{branch.rate}} / hr</p>
                            <button class="font-eurostile text-white font-bold p-1.5 border border-white rounded-full w-full lg:w-45 bg-transparent cursor-pointer uppercase"
                            (click)="viewing_branch.set(branch)">View More</button>
                        </div>
                    </div>
                </div>
            }
        </div>
    }@else {
        <div class="flex flex-col w-full ml-10 text-white">
            <div class="flex cursor-pointer p-2" (click)="viewing_branch.set(null)">
                <p class="font-lexend text-base">Back to Branches</p>
            </div>
            <div class="flex items-center justify-between w-full  mb-5">
                <div class="flex flex-col">
                    <h2 class="font-lexend font-bold text-3xl uppercase mb-1">{{viewing_branch()?.name}}</h2>
                    <div class="flex">
                        <img src="/images/loc_white.png" alt="location" class="h-8">
                        <p class="ml-2 font-open-sans text-xs">{{viewing_branch()?.address}}</p>
                    </div>
                </div>
                <button class="font-eurostile text-black bg-white font-bold p-1.5 rounded-full w-full h-10 lg:w-45 cursor-pointer uppercase"
                (click)="viewing_branch.set(null)">Select Branch</button>
            </div>
            <p></p>
        </div>
    }
</div>
