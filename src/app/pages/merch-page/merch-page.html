<div class="min-h-screen h-fit pt-30 pb-10 md:px-15">
    <div class="flex w-full">
        <h2 class="font-hanson font-bold text-3xl lg:text-5xl text-black mt-auto mb-auto lg:mr-5 w-full lg:w-110 lg:text-left text-center">Merchandise</h2>
        <hr class="w-full bg-black rounded-xs h-0.75 my-auto lg:block hidden">
        <img src="/images/black_diamond.png" alt="diamond" class="w-20 -translate-x-1 lg:block hidden">
    </div>
    <div class="flex flex-wrap mt-15 justify-center lg:justify-start">
        @for (merch of merchandises(); track merch; let i = $index) {
            <div class="item w-80 flex flex-col mx-15">
                <a href="/merch/item/{{merch.id}}">
                    <img src="{{merch.thumbnail}}" alt="{{merch.name}}" class="w-full hover:scale-110 transition-all duration-500 ease-in-out">
                    <h4 class="text-black font-open-sans font-bold text-xl text-center mt-5">{{merch.name}}</h4>
                    <p class="text-black font-open-sans text-xl text-center">₱{{merch.price}}</p>
                </a>
            </div>
        }
        
    </div>
</div>
