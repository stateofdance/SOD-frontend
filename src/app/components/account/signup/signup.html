<div class="flex flex-col w-full h-full p-5 bg-black text-white overflow-y-auto">
    <img src="/images/SOD_Logo_FA-21.png" alt="Stage of Dance Logo" class="w-25 my-5  mx-auto">
    <h2 class="font-hanson text-white font-bold text-4xl text-center">Sign Up</h2>
    <input type="text" [formControl]="first_name" name="first_name" id="first_name" placeholder="First Name" class="mt-10 p-2 border border-white text-white font-open-sans focus:outline-none focus:ring-0 focus:border-gold focus:border-2">
    <input type="text" [formControl]="last_name" name="last_name" id="last_name" placeholder="Last Name" class="mt-5 p-2 border border-white text-white font-open-sans focus:outline-none focus:ring-0 focus:border-gold focus:border-2">
    <input type="email" [formControl]="email" name="email" id="email" placeholder="Email" class="mt-5 p-2 border border-white text-white font-open-sans focus:outline-none focus:ring-0 focus:border-gold focus:border-2">
    <app-password #password placeholder="Password" design="dark"></app-password>
    <app-password #confirm_password placeholder="Confirm Password" design="dark"></app-password>
    <input type="text" name="contact" id="contact" placeholder="Phone Number" [formControl]="number"
    class="mt-5 p-2 border border-white text-white font-open-sans focus:outline-none focus:ring-0 focus:border-gold focus:border-2">
    <input #date type="date" name="date" class="mt-5 text-white border border-white p-2 w-full [&::-webkit-calendar-picker-indicator]:invert" [formControl]="birthdate">
    <label class="flex items-center gap-3 cursor-pointer group mt-5">
        <input type="checkbox" class="peer sr-only" [formControl]="use"/>

        <div class="
            relative flex items-center justify-center
            w-3.5 h-3.5
            border border-white bg-transparent
            peer-checked:bg-white peer-checked:border-white
            transition-all duration-200
        ">
            
            <svg 
            class="w-3 h-3 opacity-100" 
            fill="none" viewBox="0 0 24 24" stroke="#000000" stroke-width="3"
            >
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
            
        </div>
        <p class="font-lexend text-xs text-white">I agree to the <a href="#" class="font-bold text-gold">Terms of Use</a></p>
    </label>
    <label class="flex items-center gap-3 cursor-pointer group mt-3">
        <input type="checkbox" class="peer sr-only" [formControl]="privacy"/>

        <div class="
            relative flex items-center justify-center
            w-3.5 h-3.5
            border border-white bg-transparent
            peer-checked:bg-white peer-checked:border-white
            transition-all duration-200
        ">
            
            <svg 
            class="w-3 h-3 opacity-100" 
            fill="none" viewBox="0 0 24 24" stroke="#000000" stroke-width="3"
            >
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
            
        </div>
        <p class="font-lexend text-xs text-white">I agree to the <a href="#" class="font-bold text-gold">Privacy Policy</a></p>
    </label>
    <button class="font-eurostile font-bold text-black text-xl rounded-full bg-white uppercase py-2 mt-10 cursor-pointer disabled:bg-gray-400" [disabled]="!enable()" (click)="signUp()">Sign Up</button>
    <p class="font-lexend text-xs text-white text-center mt-5">Already have an account? <a [routerLink]="['', {outlets: {sidebar:['login']}}]" class="font-bold text-gold">Login</a></p>
</div>
