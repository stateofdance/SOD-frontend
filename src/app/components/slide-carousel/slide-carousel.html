<div class="w-full h-full flex overflow-x-hidden touch-pan-y select-none"
    (touchstart)="onPointerDown($event)" 
    (touchmove)="onPointerMove($event)"
    (touchend)="onPointerUp()"
    
    (mousedown)="onPointerDown($event)"
    (mousemove)="onPointerMove($event)"
    (mouseup)="onPointerUp()"
    (mouseleave)="onPointerUp()"
>
    <div  #targetZone class="absolute left-1/2 -translate-x-1/2 h-full w-1/3"></div>
    <div #moving class="relative will-change-transform flex my-auto px-20 left-7/10 h-fit">
        @for (coach of coaches(); track coach; let i = $index) {
            <div #coachCard class="card flex flex-col text-white mx-10 w-80">
                <div id="img" class="relative w-full rounded-2xl z-10" [ngClass]="{'center': activeIndex() == i}">
                    <div id='overlay' class="opacity-50 bg-black absolute top-0 left-0 w-full h-full rounded-3xl transition-opacity duration-500 ease-in-out" [ngClass]="{'center':activeIndex() == i}"></div>
                    <img src="{{coach.card_picture}}" alt="coach {{i}}" class="w-full h-auto aspect-3/4 rounded-3xl">
                </div>
                <div class="absolute ml-5 w-80 bottom-0">
                    <h4 class="font-eurostile font-bold text-4xl mt-3 w-60">{{coach.name}}</h4>
                    <p class="font-eurostile text-md lg:text-xl w-80">{{coach.lessons?.join(', ')}}</p>
                </div>
            </div>
        }
        <a routerLink="/coaches">
            <div class="w-80 hover:bg-white transition-all ease-in bg-violet aspect-3/4 rounded-2xl flex cursor-pointer">
                <p class="font-eurostile m-auto w-fit font-bold">Learn more</p>
            </div>
        </a>
    </div>
</div>
