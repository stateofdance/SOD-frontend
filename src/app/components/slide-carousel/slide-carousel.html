<div class="w-full h-screen flex">
    <div  #targetZone class="absolute left-1/2 -translate-x-1/2 h-full w-1/3"></div>
    <div #moving class="relative will-change-transform flex my-auto px-20 left-7/10">
        @for (coach of coaches; track coach; let i = $index) {
            <div #coachCard class="card flex flex-col text-white mx-10 w-100">
                <div id="img" class="relative w-100 rounded-2xl z-10" [ngClass]="{'center': activeIndex() == i}">
                    <div id='overlay' class="opacity-50 bg-black absolute top-0 left-0 w-full h-full rounded-3xl transition-opacity duration-500 ease-in-out" [ngClass]="{'center':activeIndex() == i}"></div>
                    <img src="{{coach.image}}" alt="coach {{i}}" class="w-full h-auto aspect-3/4 rounded-3xl">
                </div>
                <div class="absolute ml-5 w-60 bottom-0">
                    <h4 class="font-eurostile font-bold text-4xl mt-3 w-full">{{coach.name}}</h4>
                    <p class="font-eurostile text-xl w-full">{{coach.class}}</p>
                </div>
            </div>
        }
        <div class="w-70 bg-violet h-full rounded-2xl">
            <p>google</p>
        </div>
    </div>
</div>
