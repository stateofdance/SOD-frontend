<div class="card flex flex-col w-150 m-5 shadow shadow-white rounded-2xl">
    <div class="relative h-100 overflow-hidden">
        <p class="absolute top-3 left-3 text-white font-bold font-open-sans text-[14px] bg-medium-violet py-1 px-3 rounded-full">{{class().difficulty}}</p>
        <div class="absolute bg-linear-to-t from-black from-0% to-transparent top-0 left-0 w-full h-full"></div>
        <img src="{{class().img}}" alt="class().name" class="w-full h-full object-cover rounded-t-2xl">
    </div>
    <div class="flex flex-col p-5">
        <div class="flex items-center">
            <div class="w-2 h-2 bg-violet rounded-full"></div>
            <h3 class="text-white font-bold font-lexend text-2xl ml-4">{{class().name}}</h3>
        </div>
        <p class="text-white text-base font-open-sans mt-5">{{class().description}}</p>
    </div>
</div>
